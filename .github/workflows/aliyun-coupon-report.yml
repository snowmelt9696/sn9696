name: Aliyun Coupon Report

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ALIYUN_REGION_ID: ${{ vars.ALIYUN_REGION_ID || 'cn-hangzhou' }}
      ALIYUN_BILLING_CYCLE_MONTHS: ${{ vars.ALIYUN_BILLING_CYCLE_MONTHS || '2' }}
      QQ_MAIL_USER: ${{ secrets.QQ_MAIL_USER }}
      QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
      QQ_MAIL_TO: ${{ secrets.QQ_MAIL_TO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate and email report
        run: npm run crawl:email

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aliyun-coupon-report
          path: output/
          if-no-files-found: ignore
          retention-days: 14
